<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>freeCodeCamp: Exam Environment</title>
    <script>
      // @freecodecamp/ui v6's bundle ships a CLI color helper that reads
      // `process.argv`/`process.env`/`process.platform` at module load. The
      // browser has no `process` global, so the bundle throws on import.
      // Stub the minimum surface it needs so `process || {}` resolves.
      window.process = window.process || { argv: [], env: {}, platform: "" };
    </script>
  </head>
  <body class="light-palette">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/frontend/main.tsx"></script>
  </body>
</html>
