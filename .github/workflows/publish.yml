name: "publish"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Release Environment"
        type: choice
        required: true
        options:
          - development
          - production
          - staging
        default: production
      release_type:
        description: "Release Type"
        type: choice
        # Not generally needed for production releases
        required: false
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      new_version: ${{ steps.handle-rc.outputs.new_version }}

    steps:
      - uses: actions/checkout@v6

      - name: handle release candidate new version
        id: handle-rc
        uses: actions/github-script@v9
        if: ${{ inputs.environment != 'production' }}
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          ENVIRONMENT: ${{ inputs.environment }}
        with:
          script: |
            // Version of current production release
            const { version } = require('./package.json')
            const [major, minor, patch] = version.split('.').map(Number)

            let newVersion
            if (process.env.RELEASE_TYPE === 'major') {
              newVersion = `${major + 1}.0.0`
            } else if (process.env.RELEASE_TYPE === 'minor') {
              newVersion = `${major}.${minor + 1}.0`
            } else {
              newVersion = `${major}.${minor}.${patch + 1}`
            }

            // If previous RC for given release type already exists, increment its RC number
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })

            const rcReleases = releases.data.filter(release =>
              release.tag_name.startsWith(`${process.env.ENVIRONMENT}/${newVersion}-rc.`)
            )

            if (rcReleases.length > 0) {
              // Get highest RC number
              const rcNumbers = rcReleases.map(release => {
                const match = release.tag_name.match(/rc\.(\d+)$/)
                return match ? parseInt(match[1], 10) : 0
              })
              const highestRc = Math.max(...rcNumbers)
              newVersion += `-rc.${highestRc + 1}`
            } else {
              newVersion += `-rc.0`
            }

            core.setOutput('new_version', newVersion)
            console.log(`Setting release candidate version to ${newVersion}`)

      - name: create release
        id: create-release
        uses: actions/github-script@v9
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          NEW_VERSION: ${{ steps.handle-rc.outputs.new_version }}
        with:
          # TODO: see if release already exists (e.g. re-run of failed workflow), then re-use it
          script: |
            const version = process.env.NEW_VERSION || require('./package.json').version
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `${process.env.ENVIRONMENT}/${version}`,
              name: `v${version}/${process.env.ENVIRONMENT}`,
              body: `This release is for the ${process.env.ENVIRONMENT} environment.`,
              draft: true,
              prerelease: process.env.ENVIRONMENT != "production"
            })
            console.log("Created release with id:", data.id);
            return data.id

  build-tauri:
    needs: create-release
    uses: ./.github/workflows/build.yml
    with:
      environment: ${{ inputs.environment }}
      release_id: ${{ needs.create-release.outputs.release_id }}
      new_version: ${{ needs.create-release.outputs.new_version }}
    secrets: inherit

  publish-release:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]

    steps:
      - name: trigger r2 upload
        uses: actions/github-script@v9
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          ref: ${{ github.ref }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'upload-to-r2.yml',
              ref: process.env.ref,
              inputs: {
                release_id: process.env.release_id,
              }
            })

            console.log(`Successfully triggered publish workflow for production environment`)
