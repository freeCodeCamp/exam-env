name: upload to r2

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "Release ID"
        type: number
        required: true

jobs:
  push-to-r2:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: get release meta
        id: meta
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ inputs.release_id }}
        with:
          script: |
            const releaseId = parseInt(process.env.RELEASE_ID, 10)
            if (!Number.isInteger(releaseId) || releaseId <= 0) {
              core.setFailed(`Invalid release_id: ${process.env.RELEASE_ID}`)
              return
            }

            const res = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });

            if (!res || res.status !== 200) {
              console.error("no release found by id:", releaseId);
              return process.exit(1);
            }

            const release = res.data;

            console.log("found release: ", release);

            const environment = release.tag_name.split("/").at(0);

            const validEnvironments = ['production', 'staging', 'development']
            if (!environment || !validEnvironments.includes(environment)) {
              console.error("invalid or missing environment in tag:", release.tag_name);
              return process.exit(1);
            }

            core.setOutput('environment', environment);
            console.log("setting environment to:", environment);

      - name: download sync script
        env:
          # SECURITY: Update GH_RELEASE_TO_R2_VERSION to a specific pinned release tag (never use "latest").
          # After updating the version, run: sha256sum gh-release-to-r2  and put the result in GH_RELEASE_TO_R2_SHA256.
          GH_RELEASE_TO_R2_VERSION: "v0.4.0"
          GH_RELEASE_TO_R2_SHA256: "adabcb356b54f6b6e2fd0822a666f432c477e4516bc99e90d81b1218bd9f9531"
        run: |
          mkdir bin
          curl -sSfL "https://github.com/ShaunSHamilton/gh-release-to-r2/releases/download/${GH_RELEASE_TO_R2_VERSION}/gh-release-to-r2" -o bin/gh-release-to-r2
          echo "${GH_RELEASE_TO_R2_SHA256}  bin/gh-release-to-r2" | sha256sum --check
          chmod +x bin/gh-release-to-r2
          echo "$PWD/bin" >> $GITHUB_PATH
      - name: run sync bin
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          RELEASE_ID: ${{ inputs.release_id }}
          DEPLOY_ENV: ${{ steps.meta.outputs.environment }}
        run: gh-release-to-r2 --dest "$DEPLOY_ENV" --pattern "latest\.json$"

      - name: publish release
        id: publish-release
        uses: actions/github-script@v9
        env:
          release_id: ${{ inputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
            })
